<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint! - Zugbi Juan Pedro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <header>
        <div class="menu-bar">
            <button id="btn-guardar">Guardar</button>
            <button id="btn-borrar-canvas">Limpiar Lienzo</button>
            <input type="file" id="cargaImagen">
        </div>
    </header>

    <main>
        <toolbar class="toolbar">
            <div>
                <button id="btn-lapiz">Lápiz</button>
                <label>Grosor</label>
                <input id="grosor-lapiz" type="range" min="1" max="50" value="5">
            </div>
            <div>
                <button id="btn-goma">Goma</button>
                <label>Grosor</label>
                <input id="grosor-goma" type="range" min="1" max="50" value="10">
            </div>
            <div>
                <label>Color</label>
                <input id="nroColor" type="color">
                <br></br>
            </div>
            <label for="toolbar">Filtros simples</label>
            <div class="toolbar">
                <button id="btn-imageIni">Imagen inicial</button>
                <button id="btn-escalaGrises">Escala de grises</button>
                <button id="btn-negativo">Negativo</button>
                <button id="btn-sepia">Sepia</button>
                <button id="btn-binarizacion">Binarización</button>
                <label for="btn-comic">Comic:</label>
                <input type="range" id="btn-comic" min="2" max="15" value="5">
                <div>
                    <button id="btn-r" class="btn-rgb">R</button>
                    <button id="btn-g" class="btn-rgb">G</button>
                    <button id="btn-b" class="btn-rgb">B</button>
                </div>
                <label for="btn-brillo">Brillo:</label>
                <input id="btn-brillo" type="range" min="-50" max="50" value="0">
                <span id="valorBrillo">0</span>
            </div>
            <label for="toolbar">Filtros avanzados</label>
            <div class="toolbar">
                <label for="btn-saturacion">Saturación:</label>
                <input id="btn-saturacion" type="range" min="0" max="3" value="1">
                <button id="btn-bordes">Detección de bordes</button>
                <button id="btn-blur">blur</button>
            </div>
        </toolbar>
        <div class="canvas-container">
            <canvas id="lienzo" width="800" height="600"></canvas>
        </div>
    </main>

    <script type="module" src="js/botones.js"></script>

</body>

</html>
